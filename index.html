<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>linglingkwong 的个人主页</title>

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; }
        img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #1a73e8; }
        h1 { color: #333; margin: 20px 0 10px 0; }
        p { color: #666; font-size: 16px; line-height: 1.6; }
        .links { margin-top: 25px; }
        .btn { display: inline-block; padding: 10px 20px; background: #1a73e8; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://github.com/identicons/linglingkwong.png" alt="Avatar">
        <h1>linglingkwong</h1>
        <p>欢迎来到我的个人主页！这里是我的技术与生活分享空间。</p>
        <div class="links">
            <a href="https://auth-system-moi2.onrender.com" class="btn" target="_blank">🛡️授权验证系统</a>
        </div>
    </div>

</html>
